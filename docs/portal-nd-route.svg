<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" font-family="ui-monospace,Menlo,Consolas,monospace">
  <defs><clipPath id="ring"><circle cx="160" cy="176" r="132"/></clipPath></defs>
  <rect width="320" height="320" rx="10" fill="#000"/>

  <!-- map hint under the compass -->
  <g clip-path="url(#ring)">
    <polyline fill="none" stroke="#243039" points="30,120 90,140 140,132 200,150 260,140 300,160"/>
    <g fill="#39505f" font-size="8"><circle cx="110" cy="150" r="2"/><text x="114" y="153">CVG</text><circle cx="230" cy="210" r="2"/><text x="234" y="213">LUK</text></g>
    <!-- yellow flight-plan route + markers + names -->
    <polyline fill="none" stroke="#ffd200" stroke-width="2.5" points="78,248 150,152 228,110"/>
    <g fill="#ffd200"><rect x="74" y="244" width="9" height="9"/><rect x="146" y="148" width="9" height="9"/><rect x="224" y="106" width="9" height="9"/></g>
    <g fill="#ffe680" font-size="11"><text x="87" y="256">START</text><text x="159" y="160">MIDPT</text><text x="236" y="118">DEST</text></g>
  </g>

  <!-- compass rings -->
  <circle cx="160" cy="176" r="132" fill="none" stroke="#e8e8e8" stroke-width="1.5"/>
  <circle cx="160" cy="176" r="99" fill="none" stroke="#6b7280" opacity="0.6"/>
  <circle cx="160" cy="176" r="66" fill="none" stroke="#6b7280" opacity="0.6"/>
  <!-- cardinal ticks -->
  <g stroke="#e8e8e8"><line x1="160" y1="44" x2="160" y2="58"/><line x1="292" y1="176" x2="278" y2="176"/><line x1="160" y1="308" x2="160" y2="294"/><line x1="28" y1="176" x2="42" y2="176"/></g>
  <g fill="#e8e8e8" font-size="12" text-anchor="middle"><text x="160" y="74">N</text><text x="272" y="180">E</text><text x="160" y="298">S</text><text x="48" y="180">W</text></g>

  <!-- heading box -->
  <rect x="132" y="18" width="56" height="24" rx="3" fill="#000" stroke="#e8e8e8"/>
  <text x="160" y="35" fill="#e8e8e8" font-size="14" text-anchor="middle">018</text>
  <path d="M160,44 l-6,8 h12 z" fill="#e8e8e8"/>

  <!-- aircraft symbol -->
  <path d="M160,168 l-11,16 h22 z" fill="none" stroke="#e8e8e8" stroke-width="1.5"/>

  <text x="160" y="316" fill="#ffd200" font-size="10" text-anchor="middle">flight plan overlays the moving map</text>
</svg>
