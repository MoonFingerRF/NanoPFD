<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 700" font-family="ui-monospace,Menlo,Consolas,monospace">
  <defs><clipPath id="map"><rect x="30" y="150" width="400" height="280" rx="7"/></clipPath></defs>
  <rect width="460" height="700" rx="16" fill="#05070a"/>
  <rect x="0.5" y="0.5" width="459" height="699" rx="16" fill="none" stroke="#1b2228"/>

  <!-- header -->
  <text x="230" y="34" fill="#22d3ee" font-size="20" font-weight="700" letter-spacing="3" text-anchor="middle">NANO·PFD</text>
  <text x="230" y="50" fill="#6b7280" font-size="10" letter-spacing="2" text-anchor="middle">CONFIGURATION</text>

  <!-- nav: Flight Plan active -->
  <rect x="14" y="66" width="196" height="40" rx="7" fill="#11161b" stroke="#1b2228"/>
  <text x="112" y="91" fill="#6b7280" font-size="13" text-anchor="middle">▣ Log</text>
  <rect x="216" y="66" width="180" height="40" rx="7" fill="#22d3ee"/>
  <text x="306" y="91" fill="#001014" font-size="13" font-weight="700" text-anchor="middle">⚑ Flight Plan</text>
  <rect x="402" y="66" width="44" height="40" rx="7" fill="#11161b" stroke="#1b2228"/>
  <text x="424" y="92" fill="#6b7280" font-size="16" text-anchor="middle">⚙</text>

  <!-- flight plan card -->
  <rect x="14" y="120" width="432" height="566" rx="9" fill="#0c0f12" stroke="#1b2228"/>
  <text x="26" y="140" fill="#37d067" font-size="11" letter-spacing="2">FLIGHT PLAN</text>
  <text x="150" y="140" fill="#6b7280" font-size="10">3 waypoints</text>
  <line x1="26" y1="146" x2="434" y2="146" stroke="#1b2228"/>

  <!-- map -->
  <rect x="30" y="150" width="400" height="280" rx="7" fill="#06090c" stroke="#1b2228"/>
  <g clip-path="url(#map)">
    <!-- lat/lon grid -->
    <g stroke="#141a1f"><line x1="110" y1="150" x2="110" y2="430"/><line x1="210" y1="150" x2="210" y2="430"/><line x1="310" y1="150" x2="310" y2="430"/><line x1="410" y1="150" x2="410" y2="430"/>
      <line x1="30" y1="205" x2="430" y2="205"/><line x1="30" y1="290" x2="430" y2="290"/><line x1="30" y1="375" x2="430" y2="375"/></g>
    <g fill="#3a444d" font-size="9"><text x="212" y="425">-84.50</text><text x="312" y="425">-84.25</text><text x="34" y="287">39.25</text><text x="34" y="372">39.00</text></g>
    <!-- coarse coastline / border hint -->
    <polyline fill="none" stroke="#243039" points="40,180 90,200 130,196 180,215 210,240 250,235 300,255 360,250 420,270"/>
    <polyline fill="none" stroke="#243039" points="60,410 120,390 170,395 230,375 300,385 380,365"/>
    <!-- reference airports -->
    <g fill="#39505f" font-size="9"><circle cx="150" cy="230" r="2"/><text x="155" y="233">CVG</text>
      <circle cx="340" cy="320" r="2"/><text x="345" y="323">LUK</text>
      <circle cx="250" cy="180" r="2"/><text x="255" y="183">DAY</text></g>
    <!-- GPS position -->
    <circle cx="190" cy="300" r="4" fill="#37d067"/><text x="198" y="303" fill="#37d067" font-size="10">GPS</text>
    <!-- yellow route + waypoints -->
    <polyline fill="none" stroke="#fd6800" stroke-width="2" points="120,340 230,270 350,215"/>
    <g fill="#fd6800"><rect x="116" y="336" width="8" height="8"/><rect x="226" y="266" width="8" height="8"/><rect x="346" y="211" width="8" height="8"/></g>
    <g fill="#ffd9a6" font-size="11"><text x="128" y="348">START</text><text x="238" y="278">MIDPT</text><text x="358" y="223">DEST</text></g>
  </g>
  <text x="30" y="446" fill="#6b7280" font-size="10">Tap the map to add a waypoint · drag a marker to move · pinch/scroll to zoom</text>

  <!-- waypoint list -->
  <g font-size="11">
    <rect x="30" y="456" width="150" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="40" y="473" fill="#e8e8e8">START</text>
    <rect x="186" y="456" width="118" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="296" y="473" fill="#e8e8e8" text-anchor="end">39.05</text>
    <rect x="310" y="456" width="86" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="388" y="473" fill="#e8e8e8" text-anchor="end">-84.66</text>
    <rect x="402" y="456" width="30" height="26" rx="6" fill="#2a1015" stroke="#52222a"/><text x="417" y="473" fill="#fd6a6a" text-anchor="middle">✕</text>

    <rect x="30" y="488" width="150" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="40" y="505" fill="#e8e8e8">MIDPT</text>
    <rect x="186" y="488" width="118" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="296" y="505" fill="#e8e8e8" text-anchor="end">39.16</text>
    <rect x="310" y="488" width="86" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="388" y="505" fill="#e8e8e8" text-anchor="end">-84.40</text>
    <rect x="402" y="488" width="30" height="26" rx="6" fill="#2a1015" stroke="#52222a"/><text x="417" y="505" fill="#fd6a6a" text-anchor="middle">✕</text>

    <rect x="30" y="520" width="150" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="40" y="537" fill="#e8e8e8">DEST</text>
    <rect x="186" y="520" width="118" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="296" y="537" fill="#e8e8e8" text-anchor="end">39.30</text>
    <rect x="310" y="520" width="86" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="388" y="537" fill="#e8e8e8" text-anchor="end">-84.10</text>
    <rect x="402" y="520" width="30" height="26" rx="6" fill="#2a1015" stroke="#52222a"/><text x="417" y="537" fill="#fd6a6a" text-anchor="middle">✕</text>
  </g>

  <!-- action buttons -->
  <g font-size="11">
    <rect x="30" y="556" width="110" height="28" rx="6" fill="#11161b" stroke="#1b2228"/><text x="85" y="574" fill="#e8e8e8" text-anchor="middle">+ Waypoint</text>
    <rect x="148" y="556" width="150" height="28" rx="6" fill="#11161b" stroke="#1b2228"/><text x="223" y="574" fill="#e8e8e8" text-anchor="middle">Center on GPS</text>
    <rect x="306" y="556" width="90" height="28" rx="6" fill="#11161b" stroke="#1b2228"/><text x="351" y="574" fill="#e8e8e8" text-anchor="middle">Clear</text>
  </g>

  <!-- save -->
  <rect x="30" y="596" width="400" height="42" rx="9" fill="#22d3ee"/>
  <text x="230" y="622" fill="#001014" font-size="13" font-weight="700" letter-spacing="2" text-anchor="middle">SAVE FLIGHT PLAN</text>
  <text x="230" y="656" fill="#37d067" font-size="11" text-anchor="middle">✓ saved to flash</text>
</svg>
