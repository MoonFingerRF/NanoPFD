<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 360" font-family="ui-monospace,Menlo,Consolas,monospace">
  <defs><clipPath id="scr"><rect x="0" y="0" width="300" height="360" rx="8"/></clipPath></defs>
  <g clip-path="url(#scr)">
    <!-- attitude: sky over ground -->
    <rect x="0" y="0" width="300" height="180" fill="#4a90d9"/>
    <rect x="0" y="180" width="300" height="180" fill="#8a5a2b"/>
    <rect x="0" y="178" width="300" height="4" fill="#e8e8e8"/>
    <!-- pitch ladder hints -->
    <g stroke="#e8e8e8" stroke-width="1.5" opacity="0.85">
      <line x1="150" y1="120" x2="200" y2="120"/><line x1="150" y1="240" x2="200" y2="240"/>
      <line x1="165" y1="90" x2="195" y2="90"/><line x1="165" y1="270" x2="195" y2="270"/></g>
    <g fill="#e8e8e8" font-size="9"><text x="205" y="123">10</text><text x="205" y="243">10</text></g>

    <!-- ===== airspeed V-speed strip (right of the tape line at x=92) ===== -->
    <!-- red overspeed block (above 110) -->
    <rect x="93" y="30" width="46" height="50" fill="#e5352b"/>
    <!-- amber caution band (90..110) -->
    <rect x="93" y="80" width="46" height="40" fill="#ffd200"/>
    <!-- amber maneuvering band just above stall -->
    <rect x="93" y="222" width="46" height="8" fill="#ffd200"/>
    <!-- red stall block (below 35) -->
    <rect x="93" y="230" width="46" height="100" fill="#e5352b"/>

    <!-- airspeed tape line + ticks + numbers (left of x=92) -->
    <line x1="92" y1="30" x2="92" y2="330" stroke="#e8e8e8" stroke-width="2"/>
    <g stroke="#e8e8e8"><line x1="76" y1="60" x2="92" y2="60"/><line x1="76" y1="100" x2="92" y2="100"/>
      <line x1="76" y1="140" x2="92" y2="140"/><line x1="76" y1="220" x2="92" y2="220"/>
      <line x1="76" y1="260" x2="92" y2="260"/><line x1="84" y1="80" x2="92" y2="80"/>
      <line x1="84" y1="120" x2="92" y2="120"/><line x1="84" y1="200" x2="92" y2="200"/><line x1="84" y1="240" x2="92" y2="240"/></g>
    <g fill="#e8e8e8" font-size="12" text-anchor="end">
      <text x="72" y="64">120</text><text x="72" y="104">100</text><text x="72" y="144">80</text>
      <text x="72" y="224">40</text><text x="72" y="264">20</text></g>

    <!-- V1 / Vr speed bugs (short bar + label) -->
    <rect x="93" y="219" width="14" height="3" fill="#37d067"/><text x="110" y="223" fill="#37d067" font-size="11">VR</text>
    <rect x="93" y="239" width="14" height="3" fill="#22d3ee"/><text x="110" y="243" fill="#22d3ee" font-size="11">V1</text>

    <!-- current speed readout box (points at the tape) -->
    <path d="M92,168 h-40 v-16 h-16 l-8,8 8,8 h16 v-16" fill="#000" stroke="#e8e8e8"/>
    <text x="66" y="185" fill="#e8e8e8" font-size="18" text-anchor="middle" font-weight="700">60</text>
    <!-- unit label -->
    <text x="90" y="24" fill="#9aa6b2" font-size="10" text-anchor="end">KT</text>

    <!-- aircraft reference symbol -->
    <g stroke="#e8e8e8" stroke-width="3" fill="none"><path d="M150,180 l-18,0 M150,180 l18,0"/></g>
    <rect x="146" y="176" width="8" height="8" fill="#e8e8e8"/>
  </g>
  <rect x="0.5" y="0.5" width="299" height="359" rx="8" fill="none" stroke="#1b2228"/>
  <!-- callouts -->
  <g font-size="10" fill="#e8e8e8" font-family="ui-monospace"></g>
</svg>
