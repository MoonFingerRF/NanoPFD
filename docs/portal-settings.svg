<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 400" font-family="ui-monospace,Menlo,Consolas,monospace">
  <rect width="460" height="400" rx="16" fill="#05070a"/>
  <rect x="0.5" y="0.5" width="459" height="399" rx="16" fill="none" stroke="#1b2228"/>

  <!-- header -->
  <text x="230" y="34" fill="#22d3ee" font-size="20" font-weight="700" letter-spacing="3" text-anchor="middle">NANO·PFD</text>
  <text x="230" y="50" fill="#6b7280" font-size="10" letter-spacing="2" text-anchor="middle">CONFIGURATION</text>

  <!-- nav: gear highlighted -->
  <rect x="14" y="66" width="196" height="40" rx="7" fill="#11161b" stroke="#1b2228"/>
  <text x="112" y="91" fill="#6b7280" font-size="13" text-anchor="middle">▣ Log</text>
  <rect x="216" y="66" width="180" height="40" rx="7" fill="#11161b" stroke="#1b2228"/>
  <text x="306" y="91" fill="#6b7280" font-size="13" text-anchor="middle">⚑ Flight Plan</text>
  <rect x="402" y="66" width="44" height="40" rx="7" fill="#22d3ee"/>
  <text x="424" y="92" fill="#001014" font-size="16" text-anchor="middle">⚙</text>

  <!-- a settings pane behind (Attitude) -->
  <rect x="14" y="120" width="432" height="120" rx="9" fill="#0c0f12" stroke="#1b2228"/>
  <text x="26" y="140" fill="#37d067" font-size="11" letter-spacing="2">IMU ORIENTATION</text>
  <line x1="26" y1="146" x2="434" y2="146" stroke="#1b2228"/>
  <g font-size="12" fill="#e8e8e8">
    <text x="26" y="170">Upside down</text>
    <rect x="386" y="158" width="48" height="26" rx="13" fill="#2a333c"/><circle cx="399" cy="171" r="10" fill="#9aa6b2"/>
    <text x="26" y="204">Reverse roll</text>
    <rect x="386" y="192" width="48" height="26" rx="13" fill="#5aa9e6"/><circle cx="421" cy="205" r="10" fill="#fff"/>
  </g>

  <rect x="14" y="252" width="432" height="66" rx="9" fill="#0c0f12" stroke="#1b2228"/>
  <text x="26" y="272" fill="#37d067" font-size="11" letter-spacing="2">COMPASS</text>
  <line x1="26" y1="278" x2="434" y2="278" stroke="#1b2228"/>
  <text x="26" y="302" fill="#e8e8e8" font-size="12">Heading offset</text>
  <rect x="330" y="290" width="80" height="24" rx="6" fill="#11161b" stroke="#2a333c"/><text x="404" y="307" fill="#e8e8e8" font-size="12" text-anchor="end">0</text>
  <text x="416" y="307" fill="#6b7280" font-size="11">deg</text>

  <!-- SETTINGS DROPDOWN (open) -->
  <rect x="300" y="112" width="146" height="210" rx="7" fill="#11161b" stroke="#1b2228"/>
  <g font-size="12" fill="#e8e8e8">
    <rect x="304" y="116" width="138" height="30" rx="5" fill="#1b2228"/><text x="314" y="136">Attitude</text>
    <text x="314" y="168">Display</text>
    <text x="314" y="200">Nav</text>
    <text x="314" y="232">Air</text>
    <text x="314" y="264">Tune</text>
    <text x="314" y="296">WiFi</text>
  </g>
  <path d="M420,108 l-6,-8 h12 z" fill="#11161b" stroke="#1b2228"/>
</svg>
