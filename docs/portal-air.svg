<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 470" font-family="ui-monospace,Menlo,Consolas,monospace">
  <rect width="460" height="470" rx="16" fill="#05070a"/>
  <rect x="0.5" y="0.5" width="459" height="469" rx="16" fill="none" stroke="#1b2228"/>
  <text x="230" y="34" fill="#22d3ee" font-size="20" font-weight="700" letter-spacing="3" text-anchor="middle">NANO·PFD</text>
  <text x="230" y="50" fill="#6b7280" font-size="10" letter-spacing="2" text-anchor="middle">CONFIGURATION · AIR</text>

  <!-- Units card -->
  <rect x="14" y="66" width="432" height="128" rx="9" fill="#0c0f12" stroke="#1b2228"/>
  <text x="26" y="86" fill="#37d067" font-size="11" letter-spacing="2">UNITS</text>
  <line x1="26" y1="92" x2="434" y2="92" stroke="#1b2228"/>
  <g font-size="12" fill="#e8e8e8">
    <text x="26" y="116">Airspeed</text>
    <rect x="300" y="102" width="134" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="312" y="119">knots</text><text x="424" y="119" fill="#6b7280" text-anchor="end">▾</text>
    <text x="26" y="150">Ground speed</text>
    <rect x="300" y="136" width="134" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="312" y="153">knots</text><text x="424" y="153" fill="#6b7280" text-anchor="end">▾</text>
    <text x="26" y="184">Altitude</text>
    <rect x="300" y="170" width="134" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="312" y="187">feet</text><text x="424" y="187" fill="#6b7280" text-anchor="end">▾</text>
  </g>

  <!-- V-speeds card -->
  <rect x="14" y="206" width="432" height="248" rx="9" fill="#0c0f12" stroke="#1b2228"/>
  <text x="26" y="226" fill="#37d067" font-size="11" letter-spacing="2">V-SPEEDS</text>
  <text x="118" y="226" fill="#6b7280" font-size="10">in airspeed units · 0 = off</text>
  <line x1="26" y1="232" x2="434" y2="232" stroke="#1b2228"/>
  <g font-size="12" fill="#e8e8e8">
    <text x="26" y="258">V1</text>
    <rect x="350" y="244" width="84" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="424" y="261" text-anchor="end">30</text>
    <text x="26" y="292">Rotation (Vʀ)</text>
    <rect x="350" y="278" width="84" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="424" y="295" text-anchor="end">40</text>
    <text x="26" y="326">Stall — red below</text>
    <rect x="350" y="312" width="84" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="424" y="329" text-anchor="end">35</text>
    <text x="26" y="360">Caution — amber above</text>
    <rect x="350" y="346" width="84" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="424" y="363" text-anchor="end">90</text>
    <text x="26" y="394">Overspeed — red above</text>
    <rect x="350" y="380" width="84" height="26" rx="6" fill="#11161b" stroke="#2a333c"/><text x="424" y="397" text-anchor="end">110</text>
  </g>
  <text x="26" y="426" fill="#6b7280" font-size="10">Red blocks below Stall + above Overspeed, amber Caution→Overspeed</text>
  <text x="26" y="442" fill="#6b7280" font-size="10">band; V1/Vʀ show as speed bugs on the airspeed tape.</text>
</svg>
