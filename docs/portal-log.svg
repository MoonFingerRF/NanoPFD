<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 660" font-family="ui-monospace,Menlo,Consolas,monospace">
  <defs>
    <clipPath id="p0"><rect x="30" y="212" width="400" height="70" rx="7"/></clipPath>
    <clipPath id="p1"><rect x="30" y="300" width="400" height="70" rx="7"/></clipPath>
    <clipPath id="p2"><rect x="30" y="388" width="400" height="70" rx="7"/></clipPath>
    <clipPath id="p3"><rect x="30" y="476" width="400" height="70" rx="7"/></clipPath>
  </defs>
  <rect width="460" height="660" rx="16" fill="#05070a"/>
  <rect x="0.5" y="0.5" width="459" height="659" rx="16" fill="none" stroke="#1b2228"/>

  <!-- header -->
  <text x="230" y="34" fill="#22d3ee" font-size="20" font-weight="700" letter-spacing="3" text-anchor="middle">NANO·PFD</text>
  <text x="230" y="50" fill="#6b7280" font-size="10" letter-spacing="2" text-anchor="middle">CONFIGURATION</text>

  <!-- nav: Log active, Flight Plan, gear -->
  <rect x="14" y="66" width="196" height="40" rx="7" fill="#22d3ee"/>
  <text x="112" y="91" fill="#001014" font-size="13" font-weight="700" text-anchor="middle">▣ Log</text>
  <rect x="216" y="66" width="180" height="40" rx="7" fill="#11161b" stroke="#1b2228"/>
  <text x="306" y="91" fill="#6b7280" font-size="13" text-anchor="middle">⚑ Flight Plan</text>
  <rect x="402" y="66" width="44" height="40" rx="7" fill="#11161b" stroke="#1b2228"/>
  <text x="424" y="92" fill="#6b7280" font-size="16" text-anchor="middle">⚙</text>

  <!-- session peaks card -->
  <rect x="14" y="120" width="432" height="80" rx="9" fill="#0c0f12" stroke="#1b2228"/>
  <text x="26" y="140" fill="#37d067" font-size="11" letter-spacing="2">SESSION PEAKS</text>
  <line x1="26" y1="146" x2="434" y2="146" stroke="#1b2228"/>
  <g font-size="10" fill="#6b7280">
    <rect x="26" y="152" width="196" height="40" rx="6" fill="#11161b" stroke="#1b2228"/>
    <text x="36" y="167">TOP GPS</text><text x="36" y="186" fill="#22d3ee" font-size="17">128 kt</text>
    <rect x="238" y="152" width="196" height="40" rx="6" fill="#11161b" stroke="#1b2228"/>
    <text x="248" y="167">TOP AIRSPEED</text><text x="248" y="186" fill="#22d3ee" font-size="17">141 mph</text>
  </g>

  <!-- history: 4 stacked plots -->
  <rect x="14" y="206" width="432" height="404" rx="9" fill="#0c0f12" stroke="#1b2228"/>
  <text x="26" y="224" fill="#37d067" font-size="11" letter-spacing="2">HISTORY</text>
  <text x="120" y="224" fill="#6b7280" font-size="10">last 26:30 · ended 14:58:40Z</text>

  <!-- plot 1 GPS (cyan) -->
  <text x="30" y="220" fill="#6b7280" font-size="9" opacity="0"> </text>
  <rect x="30" y="212" width="400" height="70" rx="7" fill="#06090c" stroke="#1b2228"/>
  <g clip-path="url(#p0)" fill="none" stroke="#141a1f"><line x1="30" y1="235" x2="430" y2="235"/><line x1="30" y1="258" x2="430" y2="258"/></g>
  <polyline clip-path="url(#p0)" fill="none" stroke="#22d3ee" stroke-width="1.5" points="34,270 90,255 140,240 190,244 240,228 290,235 340,222 390,232 426,225"/>
  <text x="34" y="224" fill="#6b7280" font-size="9">GPS SPEED · KT</text>
  <text x="34" y="278" fill="#6b7280" font-size="9">0</text>

  <!-- plot 2 ASI (green) -->
  <rect x="30" y="300" width="400" height="70" rx="7" fill="#06090c" stroke="#1b2228"/>
  <g clip-path="url(#p1)" fill="none" stroke="#141a1f"><line x1="30" y1="323" x2="430" y2="323"/><line x1="30" y1="346" x2="430" y2="346"/></g>
  <polyline clip-path="url(#p1)" fill="none" stroke="#37d067" stroke-width="1.5" points="34,358 90,340 140,330 190,335 240,318 290,326 340,315 390,322 426,320"/>
  <text x="34" y="312" fill="#6b7280" font-size="9">AIRSPEED · MPH</text>

  <!-- plot 3 Alt (blue) -->
  <rect x="30" y="388" width="400" height="70" rx="7" fill="#06090c" stroke="#1b2228"/>
  <g clip-path="url(#p2)" fill="none" stroke="#141a1f"><line x1="30" y1="411" x2="430" y2="411"/><line x1="30" y1="434" x2="430" y2="434"/></g>
  <polyline clip-path="url(#p2)" fill="none" stroke="#5aa9e6" stroke-width="1.5" points="34,448 100,430 170,405 240,398 310,402 380,412 426,420"/>
  <text x="34" y="400" fill="#6b7280" font-size="9">ALTITUDE · FT</text>

  <!-- plot 4 G (orange) -->
  <rect x="30" y="476" width="400" height="70" rx="7" fill="#06090c" stroke="#1b2228"/>
  <g clip-path="url(#p3)" fill="none" stroke="#141a1f"><line x1="30" y1="499" x2="430" y2="499"/><line x1="30" y1="522" x2="430" y2="522"/></g>
  <polyline clip-path="url(#p3)" fill="none" stroke="#fd6800" stroke-width="1.5" points="34,515 80,512 120,500 160,520 210,508 260,516 300,494 350,518 400,510 426,514"/>
  <text x="34" y="488" fill="#6b7280" font-size="9">LOAD FACTOR · G</text>

  <!-- zoom controls -->
  <rect x="30" y="558" width="34" height="26" rx="6" fill="#11161b" stroke="#1b2228"/><text x="47" y="576" fill="#e8e8e8" font-size="13" text-anchor="middle">−</text>
  <rect x="70" y="558" width="34" height="26" rx="6" fill="#11161b" stroke="#1b2228"/><text x="87" y="576" fill="#e8e8e8" font-size="13" text-anchor="middle">+</text>
  <rect x="110" y="558" width="42" height="26" rx="6" fill="#11161b" stroke="#1b2228"/><text x="131" y="576" fill="#e8e8e8" font-size="12" text-anchor="middle">fit</text>
  <text x="162" y="576" fill="#6b7280" font-size="10">14:32:10 – 14:58:40 UTC</text>
  <text x="30" y="600" fill="#6b7280" font-size="10">Drag to pan · pinch or −/+ to zoom the time axis</text>
</svg>
